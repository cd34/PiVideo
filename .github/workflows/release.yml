name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev reprepro

      - name: Install cross
        run: cargo install cross --locked

      - name: Build daemon (aarch64)
        run: cd daemon && cross build --release --target aarch64-unknown-linux-gnu

      - name: Build .deb
        run: make deb

      - name: Prepare rootfs overlay
        run: bash image/scripts/build.sh

      - name: Build SD card image
        run: |
          sudo apt-get install -y coreutils quilt parted qemu-user-static debootstrap \
            zerofree zip dosfstools libarchive-tools libcap2-bin rsync xz-utils \
            file curl bc pigz xxd
          git clone --depth 1 https://github.com/RPi-Distro/pi-gen.git /tmp/pi-gen
          for stage in stage0 stage1 stage2; do touch /tmp/pi-gen/$stage/SKIP_IMAGES; done
          for stage in stage3 stage4 stage5; do touch /tmp/pi-gen/$stage/SKIP; done
          ln -sf "$GITHUB_WORKSPACE/image/stage-pivideo" /tmp/pi-gen/stage-pivideo
          cat > /tmp/pi-gen/config <<'EOF'
          IMG_NAME="pivideo"
          RELEASE="bookworm"
          DEPLOY_COMPRESSION=xz
          ENABLE_SSH=1
          STAGE_LIST="stage0 stage1 stage2 stage-pivideo"
          EOF
          cd /tmp/pi-gen && sudo bash build.sh

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Publish to apt repo on gh-pages
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          if git ls-remote --exit-code origin gh-pages; then
            git worktree add /tmp/apt-repo gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/apt-repo
            touch /tmp/apt-repo/.nojekyll
          fi

          mkdir -p /tmp/apt-repo/conf
          cp reprepro/conf/distributions /tmp/apt-repo/conf/distributions

          reprepro -b /tmp/apt-repo includedeb bookworm build/pivideo_*.deb

          cd /tmp/apt-repo
          git add -A
          git commit -m "Release ${GITHUB_REF_NAME}" || echo "Nothing to commit"
          git push origin gh-pages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/pivideo_*.deb
            /tmp/pi-gen/deploy/*.img.xz
          generate_release_notes: true
