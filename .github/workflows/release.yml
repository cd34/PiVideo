name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev reprepro

      - name: Install cross
        run: cargo install cross --locked

      - name: Build daemon (aarch64)
        run: cd daemon && cross build --release --target aarch64-unknown-linux-gnu

      - name: Build .deb
        run: make deb

      - name: Prepare rootfs overlay
        run: bash image/scripts/build.sh

      - name: Build SD card image
        run: |
          VERSION="$(cat VERSION)"

          # Download official Raspberry Pi OS Lite (arm64, Bookworm)
          echo "==> Downloading Raspberry Pi OS Lite arm64..."
          curl -L "https://downloads.raspberrypi.com/raspios_lite_arm64_latest" -o base.img.xz
          xz -d base.img.xz

          # Mount the root partition
          LOOP=$(sudo losetup -fP --show base.img)
          echo "Loop device: $LOOP"
          lsblk "$LOOP"
          mkdir -p /tmp/mnt
          sudo mount "${LOOP}p2" /tmp/mnt

          # Inject PiVideo overlay
          echo "==> Installing PiVideo overlay..."
          sudo rsync -a image/rootfs-overlay/ /tmp/mnt/
          sudo chmod 755 /tmp/mnt/usr/local/bin/pivideo-daemon
          sudo chmod 700 /tmp/mnt/usr/local/bin/pivideo-firstrun.sh

          # Unmount and compress
          sudo umount /tmp/mnt
          sudo losetup -d "$LOOP"
          echo "==> Compressing image..."
          xz -T0 base.img
          mv base.img.xz "build/pivideo_${VERSION}_arm64.img.xz"
          echo "==> Done: build/pivideo_${VERSION}_arm64.img.xz"

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: echo "$GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Publish to apt repo on gh-pages
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          if git ls-remote --exit-code origin gh-pages; then
            git worktree add /tmp/apt-repo gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/apt-repo
            touch /tmp/apt-repo/.nojekyll
          fi

          mkdir -p /tmp/apt-repo/conf
          cp reprepro/conf/distributions /tmp/apt-repo/conf/distributions

          reprepro -b /tmp/apt-repo remove bookworm pivideo || true
          reprepro -b /tmp/apt-repo includedeb bookworm build/pivideo_*.deb

          cd /tmp/apt-repo
          git add -A
          git commit -m "Release ${GITHUB_REF_NAME}" || echo "Nothing to commit"
          git push origin gh-pages

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
