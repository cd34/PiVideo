name: Daemon CI

on:
  push:
    paths:
      - 'daemon/**'
  pull_request:
    paths:
      - 'daemon/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Test (host)
        run: cd daemon && cargo test
      - name: Install cross
        run: cargo install cross --locked
      - name: Build (aarch64)
        run: cd daemon && cross build --release --target aarch64-unknown-linux-gnu
